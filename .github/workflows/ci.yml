name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      non-md: ${{ steps.filter.outputs.non-md }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Detect non-Markdown changes
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          set +e
          ZERO_SHA="0000000000000000000000000000000000000000"
          if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ]; then
            # Three-dot mirrors GitHub's PR diff (merge-base..head).
            files=$(git diff --name-only "$BASE_SHA...$HEAD_SHA")
            rc=$?
          elif [ -n "$PUSH_BEFORE" ] && [ -n "$PUSH_SHA" ] && [ "$PUSH_BEFORE" != "$ZERO_SHA" ]; then
            files=$(git diff --name-only "$PUSH_BEFORE" "$PUSH_SHA")
            rc=$?
          else
            echo "No valid diff range; defaulting to non-md=true"
            echo "non-md=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$rc" -ne 0 ]; then
            echo "git diff failed; defaulting to non-md=true"
            echo "non-md=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Changed files:"
          echo "$files"
          if [ -z "$files" ] || echo "$files" | grep -qv '\.md$'; then
            echo "non-md=true" >> "$GITHUB_OUTPUT"
          else
            echo "non-md=false" >> "$GITHUB_OUTPUT"
          fi

  unit-tests:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.non-md == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore tests/Reactor.Tests/Reactor.Tests.csproj

      - name: Test
        run: dotnet test tests/Reactor.Tests/Reactor.Tests.csproj --no-restore --logger "console;verbosity=normal"
