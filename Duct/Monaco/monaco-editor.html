<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #editor { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="editor"></div>
    <div id="error" style="color:red; padding:20px; font-family:monospace; white-space:pre-wrap"></div>

    <script>
        window.onerror = function(msg, url, line, col, error) {
            document.getElementById('error').textContent += 'ERROR: ' + msg + '\n  at ' + url + ':' + line + '\n';
        };
    </script>
    <script src="https://monaco.local/Assets/vs/loader.js" onerror="document.getElementById('error').textContent += 'FAILED to load loader.js\n'"></script>
    <script>
        var editor = null;
        var _suppressChangeEvent = false;

        require.config({ paths: { vs: 'https://monaco.local/Assets/vs' } });

        // Configure worker URL for Monaco language services
        window.MonacoEnvironment = {
            getWorkerUrl: function (workerId, label) {
                return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
                    self.MonacoEnvironment = { baseUrl: 'https://monaco.local/' };
                    importScripts('https://monaco.local/Assets/vs/base/worker/workerMain.js');
                `)}`;
            }
        };

        require(['vs/editor/editor.main'], function () {
            // Read initial config from the URL hash (set by C# before navigation)
            var config = {};
            try {
                var hash = decodeURIComponent(window.location.hash.substring(1));
                if (hash) config = JSON.parse(hash);
            } catch (e) { }

            editor = monaco.editor.create(document.getElementById('editor'), {
                value: config.value || '',
                language: config.language || 'plaintext',
                theme: config.theme || 'vs',
                readOnly: config.readOnly || false,
                fontSize: config.fontSize || 14,
                wordWrap: config.wordWrap ? 'on' : 'off',
                automaticLayout: true,
                minimap: { enabled: config.minimap !== false },
                scrollBeyondLastLine: false,
                renderWhitespace: 'selection',
                tabSize: 4,
                insertSpaces: true
            });

            // Notify host that editor is ready
            window.chrome.webview.postMessage(JSON.stringify({ type: 'ready' }));

            // Forward content changes to C# host
            editor.onDidChangeModelContent(function (e) {
                if (_suppressChangeEvent) return;
                window.chrome.webview.postMessage(JSON.stringify({
                    type: 'contentChanged',
                    value: editor.getValue(),
                    isFlush: e.isFlush
                }));
            });

            // Forward cursor position changes
            editor.onDidChangeCursorPosition(function (e) {
                window.chrome.webview.postMessage(JSON.stringify({
                    type: 'cursorChanged',
                    lineNumber: e.position.lineNumber,
                    column: e.position.column
                }));
            });
        });

        // ── Interop functions called from C# via ExecuteScriptAsync ──

        function monacoSetValue(text) {
            if (!editor) return;
            _suppressChangeEvent = true;
            editor.setValue(text);
            _suppressChangeEvent = false;
        }

        function monacoGetValue() {
            return editor ? editor.getValue() : '';
        }

        function monacoSetLanguage(lang) {
            if (!editor) return;
            monaco.editor.setModelLanguage(editor.getModel(), lang);
        }

        function monacoSetTheme(theme) {
            if (!editor) return;
            monaco.editor.setTheme(theme);
        }

        function monacoSetReadOnly(readOnly) {
            if (!editor) return;
            editor.updateOptions({ readOnly: readOnly });
        }

        function monacoSetFontSize(size) {
            if (!editor) return;
            editor.updateOptions({ fontSize: size });
        }

        function monacoSetWordWrap(wrap) {
            if (!editor) return;
            editor.updateOptions({ wordWrap: wrap ? 'on' : 'off' });
        }

        function monacoSetMinimap(enabled) {
            if (!editor) return;
            editor.updateOptions({ minimap: { enabled: enabled } });
        }

        function monacoUpdateOptions(optionsJson) {
            if (!editor) return;
            editor.updateOptions(JSON.parse(optionsJson));
        }

        function monacoRevealLine(lineNumber) {
            if (!editor) return;
            editor.revealLineInCenter(lineNumber);
        }

        function monacoSetPosition(lineNumber, column) {
            if (!editor) return;
            editor.setPosition({ lineNumber: lineNumber, column: column });
            editor.focus();
        }
    </script>
</body>
</html>
