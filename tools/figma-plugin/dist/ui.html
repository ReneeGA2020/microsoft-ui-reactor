<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, -apple-system, sans-serif; font-size: 11px; background: #FFFFFF; color: #1D1D1D; }
    .container { padding: 8px; display: flex; flex-direction: column; gap: 12px; }

    /* Frame status */
    .frame-status { display: flex; align-items: center; gap: 6px; padding: 8px; background: #F9FAFB; border-radius: 6px; font-size: 11px; color: #4A5565; }
    .frame-status.watching { color: #12B76A; }
    .frame-icon { width: 12px; height: 12px; opacity: 0.4; flex-shrink: 0; }
    .frame-status.watching .frame-icon { opacity: 1; }
    .frame-detail { font-size: 10px; color: #99A1AF; margin-top: 1px; }

    /* Project path section */
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-header { display: flex; justify-content: space-between; align-items: center; }
    .field-label { font-size: 11px; font-weight: 600; color: #1D1D1D; }

    /* Toggle switch */
    .toggle-row { display: flex; align-items: center; gap: 6px; }
    .toggle-text { font-size: 11px; color: #6B7280; cursor: pointer; user-select: none; }
    .toggle-text.active { color: #1D1D1D; font-weight: 500; }
    .toggle-track { width: 28px; height: 16px; border-radius: 999px; background: #CBCED4; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
    .toggle-track.on { background: #0C8CE9; }
    .toggle-knob { width: 12px; height: 12px; border-radius: 50%; background: #FFF; position: absolute; top: 2px; left: 2px; transition: left 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.12); }
    .toggle-track.on .toggle-knob { left: 14px; }

    /* Input field */
    .text-input { width: 100%; padding: 5px 8px; border-radius: 4px; font-size: 11px; border: 1px solid #E5E7EB; background: #FFF; color: #1D1D1D; font-family: inherit; outline: none; }
    .text-input:focus { border-color: #0C8CE9; }
    .text-input::placeholder { color: #9CA3AF; }

    /* Buttons */
    .btn-row { display: flex; gap: 8px; padding-top: 4px; }
    .btn { flex: 1; height: 28px; border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 4px; font-family: inherit; position: relative; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #0C8CE9; color: #FFF; }
    .btn-primary:hover:not(:disabled) { background: #0A7BD4; }
    .btn-secondary { background: #ECEEF2; color: #030213; }
    .btn-secondary:hover:not(:disabled) { background: #DDDFE5; }
    .btn-icon { width: 12px; height: 12px; flex-shrink: 0; }

    .hidden { display: none; }
    .toast { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); background: #1D1D1D; color: #FFF; padding: 4px 10px; border-radius: 4px; font-size: 11px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .hint { font-size: 10px; color: #9CA3AF; margin-top: -2px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Frame status -->
    <div class="frame-status" id="frame-status">
      <svg class="frame-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="1" y="1" width="12" height="12" rx="1.5"/>
        <line x1="5" y1="1" x2="5" y2="13"/><line x1="9" y1="1" x2="9" y2="13"/>
        <line x1="1" y1="5" x2="13" y2="5"/><line x1="1" y1="9" x2="13" y2="9"/>
      </svg>
      <div>
        <div id="frame-text">Select a frame</div>
        <div class="frame-detail" id="frame-detail"></div>
      </div>
    </div>

    <!-- Project path -->
    <div class="field-group">
      <div class="field-header">
        <span class="field-label">Output Project</span>
        <div class="toggle-row">
          <span class="toggle-text active" id="toggle-new" onclick="toggleMode()">New</span>
          <div class="toggle-track" id="toggle-track" onclick="toggleMode()">
            <div class="toggle-knob"></div>
          </div>
          <span class="toggle-text" id="toggle-existing" onclick="toggleMode()">Existing</span>
        </div>
      </div>
      <div id="panel-new">
        <input type="text" class="text-input" id="new-project-name" placeholder="Enter new project name" value="FigmaApp" oninput="updateCommands()" />
      </div>
      <div id="panel-existing" class="hidden">
        <input type="text" class="text-input" id="project-path" placeholder="Path to .csproj file" oninput="updateCommands()" />
      </div>
    </div>

    <!-- File URL fallback (hidden unless needed) -->
    <div id="file-url-input" class="hidden">
      <div class="field-group">
        <span class="field-label">File URL</span>
        <input type="text" class="text-input" id="figma-url" placeholder="Paste Figma file URL here" oninput="onFileUrlInput()" />
        <div class="hint">Paste any URL from this Figma file to enable generate</div>
      </div>
    </div>
  </div>

  <div style="padding: 0 8px 0;">
    <div class="btn-row">
      <button class="btn btn-primary" id="generate-btn" onclick="generate()" disabled>
        <svg class="btn-icon" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0L9.41 5.14L14.15 3.85L10.83 7.99L16 8L10.83 8.01L14.15 12.15L9.41 10.86L8 16L6.59 10.86L1.85 12.15L5.17 8.01L0 8L5.17 7.99L1.85 3.85L6.59 5.14L8 0Z"/>
        </svg>
        <span id="generate-label">Generate</span>
      </button>
      <button class="btn btn-secondary" id="run-btn" onclick="copyRunCmd()" disabled title="Copy dotnet watch command">
        <svg class="btn-icon" viewBox="0 0 16 16" fill="currentColor">
          <path d="M4.5 2.5C4.5 2.1 4.72 1.93 5.08 2.14L13.08 7.14C13.44 7.36 13.44 7.64 13.08 7.86L5.08 12.86C4.72 13.07 4.5 12.9 4.5 12.5V2.5Z"/>
        </svg>
        <span id="run-label">Run</span>
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    var frameInfo = null;
    var existingMode = false;

    // ─── Frame tracking ──────────────────────────────────────────────────────
    function setFrame(info) {
      frameInfo = info;
      var el = document.getElementById('frame-text');
      var detail = document.getElementById('frame-detail');
      var container = document.getElementById('frame-status');

      if (info) {
        el.textContent = info.frameName;
        detail.textContent = info.width + ' × ' + info.height + '  ·  ' + info.nodeId;
        container.className = 'frame-status watching';
        // Auto-populate project name from frame name (sanitize to valid identifier)
        if (isNewProject()) {
          var safeName = info.frameName.replace(/[^a-zA-Z0-9]/g, '');
          if (safeName) {
            document.getElementById('new-project-name').value = safeName;
          }
        }
      } else {
        el.textContent = 'Select a frame';
        detail.textContent = '';
        container.className = 'frame-status';
      }
      updateCommands();
    }

    // ─── Toggle switch ───────────────────────────────────────────────────────
    function toggleMode() {
      existingMode = !existingMode;
      document.getElementById('toggle-track').className = 'toggle-track' + (existingMode ? ' on' : '');
      document.getElementById('toggle-new').className = 'toggle-text' + (existingMode ? '' : ' active');
      document.getElementById('toggle-existing').className = 'toggle-text' + (existingMode ? ' active' : '');
      document.getElementById('panel-new').className = existingMode ? 'hidden' : '';
      document.getElementById('panel-existing').className = existingMode ? '' : 'hidden';
      document.getElementById('generate-label').textContent = existingMode ? 'Re-generate' : 'Generate';
      updateCommands();
    }

    function setExistingMode(csproj) {
      existingMode = true;
      document.getElementById('toggle-track').className = 'toggle-track on';
      document.getElementById('toggle-new').className = 'toggle-text';
      document.getElementById('toggle-existing').className = 'toggle-text active';
      document.getElementById('panel-new').className = 'hidden';
      document.getElementById('panel-existing').className = '';
      document.getElementById('project-path').value = csproj;
      document.getElementById('generate-label').textContent = 'Re-generate';
      updateCommands();
    }

    function isNewProject() { return !existingMode; }

    function getProjectName() {
      return (document.getElementById('new-project-name').value.trim() || 'FigmaApp');
    }

    function getProjectPath() {
      return document.getElementById('project-path').value.trim();
    }

    // ─── Command generation ──────────────────────────────────────────────────
    function updateCommands() {
      var hasFrame = !!frameInfo;
      document.getElementById('generate-btn').disabled = !hasFrame;
      document.getElementById('run-btn').disabled = !hasFrame || isNewProject();

      var urlInput = document.getElementById('file-url-input');
      if (hasFrame && frameInfo.needsFileKey) {
        urlInput.className = '';
      } else {
        urlInput.className = 'hidden';
      }
    }

    function getCsprojPath() {
      if (isNewProject()) {
        var name = getProjectName();
        return name + '\\' + name + '.csproj';
      }
      return getProjectPath();
    }

    // ─── Generate ────────────────────────────────────────────────────────────
    function generate() {
      if (!frameInfo) return;

      var url = frameInfo.figmaUrl || '[paste Figma URL here]';
      var csproj = getCsprojPath();
      var name = getProjectName();

      var skillRef = 'Read skills/figma.md for Figma-to-Reactor control mapping, theme tokens, typography, and layout rules. Read skills/design.md for WinUI design best practices. Use exact pixel values from Figma for all widths, heights, gaps, margins, and padding — do NOT round to a grid or substitute MinWidth/MinHeight for fixed dimensions. The goal is pixel-to-pixel accuracy with the Figma design.';
      var watchCmd = 'dotnet run --project src/Reactor.Cli -- figma watch "' + url + '" --interval 10';
      var runCmd = 'dotnet run --project ' + csproj;
      var watchLoop = ' After the initial sync, start the app with `' + runCmd +
        '` in a background shell. Then start a live watch loop: run `' + watchCmd +
        '` in another background shell. It emits JSON events to stdout when the Figma file changes.' +
        ' When you see an event with "event":"changed", re-fetch the design via get_figma_data MCP tool for file key ' + (frameInfo.fileKey || '') + ' node ' + (frameInfo.nodeId || '') +
        ', diff it against the current code, and apply only the changes needed.' +
        ' After editing the code, stop the running app process and relaunch it with `' + runCmd + '` so the changes are visible.' +
        ' Do NOT rely on dotnet watch hot reload — always restart the app after edits.' +
        ' Keep this loop running — do NOT exit after the first sync. You are a live sync agent.';

      var prompt;
      if (isNewProject()) {
        prompt = 'Create a new Reactor app called ' + name +
          ' using mur --create ' + name +
          ', then translate this Figma design into it: ' + url +
          '. ' + skillRef +
          ' After generating the code, launch the app with `' + runCmd + '`.' +
          watchLoop;
      } else {
        if (!csproj) {
          showToast('Set the project path first');
          return;
        }
        prompt = 'You are a live Figma-to-code sync agent for the Reactor app at ' + csproj + '.' +
          ' First, fetch this Figma design via get_figma_data: ' + url +
          '. Read the current Program.cs in the project and diff it against the Figma frame.' +
          ' Apply only the changes needed to bring the code in sync with the design — update text, spacing, sizing, colors, and layout to match.' +
          ' Do not regenerate from scratch unless the structure has fundamentally changed.' +
          ' ' + skillRef +
          watchLoop;
      }

      var cmd = "copilot --yolo -p '" + prompt.replace(/'/g, "''") + "'";
      copyToClipboard(cmd);

      if (isNewProject()) {
        setExistingMode(csproj);
      }

      // Update button label for existing mode
      document.getElementById('generate-label').textContent = existingMode ? 'Re-generate' : 'Generate';
      showToast('Copied — paste in terminal');
    }

    function copyRunCmd() {
      var csproj = getCsprojPath();
      if (csproj) {
        copyToClipboard('dotnet watch --non-interactive run --project ' + csproj);
        showToast('Copied — paste in terminal');
      }
    }

    // ─── Clipboard / toast ───────────────────────────────────────────────────
    function copyToClipboard(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }

    function showToast(msg) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast show';
      setTimeout(function() { el.className = 'toast'; }, 2000);
    }

    // ─── File URL input (fallback when fileKey unavailable) ─────────────────
    function onFileUrlInput() {
      var url = document.getElementById('figma-url').value.trim();
      if (url && url.indexOf('figma.com') !== -1) {
        parent.postMessage({ pluginMessage: { type: 'set-file-url', url: url } }, '*');
      }
    }

    // ─── Messages from plugin sandbox ────────────────────────────────────────
    window.onmessage = function(event) {
      var msg = event.data && event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'frame-selected') {
        setFrame(msg);
      } else if (msg.type === 'no-frame') {
        setFrame(null);
        if (msg.message) {
          document.getElementById('frame-detail').textContent = msg.message;
        }
      }
    };

    parent.postMessage({ pluginMessage: { type: 'request-frame-info' } }, '*');
  </script>
</body>
</html>
