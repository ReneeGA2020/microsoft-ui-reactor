site_name: Microsoft.UI.Reactor
site_description: Declarative UI framework for native Windows desktop apps in pure C#.
site_url: https://microsoft.github.io/microsoft-ui-reactor/
repo_url: https://github.com/microsoft/microsoft-ui-reactor
repo_name: microsoft/microsoft-ui-reactor
edit_uri: edit/main/docs/guide/

docs_dir: docs/guide
site_dir: site

# README.md is emitted by the docs compiler alongside index.md so GitHub's
# directory browser renders the landing page when browsing docs/guide/ on
# the source repo. MkDocs uses index.md; exclude README.md to avoid a
# duplicate /readme/ route.
exclude_docs: |
  README.md
  readme.md

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

validation:
  nav:
    omitted_files: ignore
    not_found: warn
  links:
    not_found: warn
    absolute_links: ignore
    unrecognized_links: ignore

