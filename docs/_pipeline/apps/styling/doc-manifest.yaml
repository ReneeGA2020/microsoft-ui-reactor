    component: ColorModifiersExample
    region: client
    format: png
  - id: signal-colors
    description: "Signal color badges for info, success, warning, error"
    component: SignalColorsExample
    region: client
    format: png
  - id: dark-light-toggle
    description: "Toggle switch controlling dark/light mode with RequestedTheme"
    component: DarkLightToggleExample
    region: client
    format: png
  - id: color-scheme-hook
    description: "Color scheme display with UseColorScheme and UseIsDarkTheme"
    component: ColorSchemeHookExample
    region: client
    format: png
  - id: lightweight-styling
    description: "Buttons with lightweight styling resource overrides"
    component: LightweightStylingExample
    region: client
    format: png
  - id: brand-override
    description: "Brand-color override cascading from a single Resources call at the root"
    component: BrandOverrideExample
