<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <style>
    text { fill: #1f2328; }
    .label { font-size: 12.5px; font-weight: 500; }
    .sub { font-size: 10.5px; fill: #57606a; }
    .group { fill: none; stroke: #afb8c1; stroke-width: 1.25; stroke-dasharray: 5 4; }
    .group-label { font-size: 12px; font-weight: 600; fill: #57606a; }
    .box { fill: #ffffff; stroke: #57606a; stroke-width: 1.5; }
    .box-xaml { fill: #ffebe9; stroke: #cf222e; stroke-width: 1.5; }
    .box-reactor { fill: #ddf4ff; stroke: #0969da; stroke-width: 1.5; }
    .edge { stroke: #57606a; stroke-width: 1.5; fill: none; }
    .edge-dashed { stroke: #57606a; stroke-width: 1.5; fill: none; stroke-dasharray: 6 4; }
    .marker-fill { fill: #57606a; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e6edf3; }
      .sub { fill: #8b949e; }
      .group { stroke: #6e7681; }
      .group-label { fill: #8b949e; }
      .box { fill: #161b22; stroke: #8b949e; }
      .box-xaml { fill: #3c0d0d; stroke: #f85149; }
      .box-reactor { fill: #0c2d6b; stroke: #58a6ff; }
      .edge { stroke: #8b949e; }
      .edge-dashed { stroke: #8b949e; }
      .marker-fill { fill: #8b949e; }
    }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path class="marker-fill" d="M0 0 L10 5 L0 10 z"/>
    </marker>
  </defs>

  <!-- XAML group -->
  <rect class="group" x="30" y="30" width="460" height="300" rx="8"/>
  <text class="group-label" x="50" y="52">XAML page (today's mental model)</text>

  <rect class="box-xaml" x="70" y="80" width="180" height="60" rx="6"/>
  <text class="label" x="160" y="103" text-anchor="middle">MyPage.xaml</text>
  <text class="sub" x="160" y="122" text-anchor="middle">controls + bindings</text>

  <rect class="box-xaml" x="290" y="80" width="170" height="60" rx="6"/>
  <text class="label" x="375" y="103" text-anchor="middle">MyPage.xaml.cs</text>
  <text class="sub" x="375" y="122" text-anchor="middle">code-behind</text>

  <rect class="box-xaml" x="70" y="200" width="180" height="60" rx="6"/>
  <text class="label" x="160" y="223" text-anchor="middle">MyPageViewModel</text>
  <text class="sub" x="160" y="242" text-anchor="middle">INPC + ICommand</text>

  <rect class="box-xaml" x="290" y="200" width="170" height="60" rx="6"/>
  <text class="label" x="375" y="223" text-anchor="middle">Value converters</text>
  <text class="sub" x="375" y="242" text-anchor="middle">IValueConverter</text>

  <path class="edge" d="M160 140 L160 200" marker-end="url(#arr)"/>
  <text class="sub" x="170" y="173">DataContext</text>
  <path class="edge" d="M250 110 L290 110" marker-end="url(#arr)"/>
  <text class="sub" x="245" y="100" text-anchor="end">x:Name</text>
  <path class="edge" d="M250 220 L290 220" marker-end="url(#arr)"/>
  <text class="sub" x="245" y="210" text-anchor="end">{Binding}</text>

  <!-- Translate arrow -->
  <path class="edge-dashed" d="M490 180 L610 180" marker-end="url(#arr)"/>
  <text class="group-label" x="550" y="170" text-anchor="middle">translate</text>

  <!-- Reactor group -->
  <rect class="group" x="610" y="30" width="460" height="300" rx="8"/>
  <text class="group-label" x="630" y="52">Reactor component</text>

  <rect class="box-reactor" x="660" y="100" width="370" height="64" rx="6"/>
  <text class="label" x="845" y="125" text-anchor="middle">public override Element Render()</text>
  <text class="sub" x="845" y="145" text-anchor="middle">single method · returns immutable Element tree</text>

  <rect class="box-reactor" x="660" y="200" width="180" height="60" rx="6"/>
  <text class="label" x="750" y="223" text-anchor="middle">UseState / UseReducer</text>
  <text class="sub" x="750" y="242" text-anchor="middle">UseEffect · UseMemo</text>

  <rect class="box-reactor" x="860" y="200" width="170" height="60" rx="6"/>
  <text class="label" x="945" y="223" text-anchor="middle">plain C# expressions</text>
  <text class="sub" x="945" y="242" text-anchor="middle">no converters</text>

  <path class="edge" d="M750 164 L750 200" marker-end="url(#arr)"/>
  <path class="edge" d="M945 164 L945 200" marker-end="url(#arr)"/>
</svg>
