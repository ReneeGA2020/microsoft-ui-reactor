<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 660" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <style>
    text { fill: #1f2328; }
    .label { font-size: 12.5px; font-weight: 500; }
    .sub { font-size: 10.5px; fill: #57606a; }
    .edge-label { font-size: 10.5px; fill: #57606a; }
    .group { fill: none; stroke: #afb8c1; stroke-width: 1.25; stroke-dasharray: 5 4; }
    .group-label { font-size: 12px; font-weight: 600; fill: #57606a; }
    .box { fill: #ffffff; stroke: #57606a; stroke-width: 1.5; }
    .box-accent { fill: #ddf4ff; stroke: #0969da; stroke-width: 1.5; }
    .box-out { fill: #d1f4d6; stroke: #1a7f37; stroke-width: 1.5; }
    .diamond { fill: #fff8c5; stroke: #9a6700; stroke-width: 1.5; }
    .edge { stroke: #57606a; stroke-width: 1.5; fill: none; }
    .edge-dashed { stroke: #57606a; stroke-width: 1.5; fill: none; stroke-dasharray: 5 3; }
    .marker-fill { fill: #57606a; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e6edf3; }
      .sub { fill: #8b949e; }
      .edge-label { fill: #8b949e; }
      .group { stroke: #6e7681; }
      .group-label { fill: #8b949e; }
      .box { fill: #161b22; stroke: #8b949e; }
      .box-accent { fill: #0c2d6b; stroke: #58a6ff; }
      .box-out { fill: #033a16; stroke: #3fb950; }
      .diamond { fill: #341a00; stroke: #d29922; }
      .edge { stroke: #8b949e; }
      .edge-dashed { stroke: #8b949e; }
      .marker-fill { fill: #8b949e; }
    }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path class="marker-fill" d="M0 0 L10 5 L0 10 z"/>
    </marker>
  </defs>

  <!-- App -->
  <rect class="box-accent" x="460" y="20" width="220" height="56" rx="6"/>
  <text class="label" x="570" y="44" text-anchor="middle">Reactor app (Release build)</text>
  <text class="sub" x="570" y="62" text-anchor="middle">run under a profiler</text>

  <!-- Choice -->
  <polygon class="diamond" points="430,140 570,100 710,140 570,180"/>
  <text class="label" x="570" y="138" text-anchor="middle">Which timeline</text>
  <text class="label" x="570" y="154" text-anchor="middle">do you need?</text>

  <!-- EventPipe group -->
  <rect class="group" x="40" y="220" width="500" height="270" rx="8"/>
  <text class="group-label" x="60" y="240">EventPipe path (Reactor only)</text>

  <rect class="box" x="100" y="260" width="380" height="60" rx="6"/>
  <text class="label" x="290" y="282" text-anchor="middle">dotnet-trace collect</text>
  <text class="sub" x="290" y="300" text-anchor="middle">--providers Microsoft-UI-Reactor:0x3:4</text>

  <rect class="box" x="150" y="350" width="280" height="50" rx="6"/>
  <text class="label" x="290" y="372" text-anchor="middle">.nettrace file</text>
  <text class="sub" x="290" y="388" text-anchor="middle">portable, any-OS viewer</text>

  <rect class="box-out" x="120" y="420" width="340" height="50" rx="6"/>
  <text class="label" x="290" y="442" text-anchor="middle">speedscope.app · VS Profiler</text>
  <text class="sub" x="290" y="458" text-anchor="middle">flame / sandwich / left-heavy</text>

  <!-- ETW group -->
  <rect class="group" x="580" y="220" width="500" height="270" rx="8"/>
  <text class="group-label" x="600" y="240">ETW path (Reactor + WinUI)</text>

  <rect class="box" x="620" y="260" width="420" height="60" rx="6"/>
  <text class="label" x="830" y="282" text-anchor="middle">PerfView · xperf -on</text>
  <text class="sub" x="830" y="300" text-anchor="middle">Microsoft-UI-Reactor + Microsoft-Windows-XAML</text>

  <rect class="box" x="690" y="350" width="280" height="50" rx="6"/>
  <text class="label" x="830" y="372" text-anchor="middle">.etl file</text>
  <text class="sub" x="830" y="388" text-anchor="middle">Windows-only, native+managed</text>

  <rect class="box-out" x="660" y="420" width="340" height="50" rx="6"/>
  <text class="label" x="830" y="442" text-anchor="middle">PerfView Events · WPA timeline</text>
  <text class="sub" x="830" y="458" text-anchor="middle">correlated Reactor + XAML spans</text>

  <!-- Spans -->
  <rect class="box-accent" x="170" y="520" width="780" height="76" rx="6"/>
  <text class="label" x="560" y="544" text-anchor="middle">Reactor span hierarchy</text>
  <text class="sub" x="560" y="562" text-anchor="middle">ReconcileStart/Stop · ChildReconcileStart/Stop · ComponentRenderStart/Stop</text>
  <text class="sub" x="560" y="578" text-anchor="middle">EffectsFlushStart/Stop · StateChange · EventTrampolineDispatch</text>

  <!-- Outlier band callout -->
  <rect class="box" x="630" y="618" width="380" height="30" rx="6"/>
  <text class="sub" x="820" y="638" text-anchor="middle">Sort by elapsed µs → slow reconcile / unstable UseMemo deps</text>

  <!-- Edges -->
  <path class="edge" d="M570 76 L570 100" marker-end="url(#arr)"/>
  <path class="edge" d="M460 160 L290 260" marker-end="url(#arr)"/>
  <text class="edge-label" x="320" y="220">Reactor-only,</text>
  <text class="edge-label" x="320" y="234">any OS</text>
  <path class="edge" d="M680 160 L830 260" marker-end="url(#arr)"/>
  <text class="edge-label" x="780" y="220">frame stutter</text>
  <text class="edge-label" x="780" y="234">may be WinUI</text>

  <path class="edge" d="M290 320 L290 350" marker-end="url(#arr)"/>
  <path class="edge" d="M290 400 L290 420" marker-end="url(#arr)"/>
  <path class="edge" d="M290 470 L290 520" marker-end="url(#arr)"/>

  <path class="edge" d="M830 320 L830 350" marker-end="url(#arr)"/>
  <path class="edge" d="M830 400 L830 420" marker-end="url(#arr)"/>
  <path class="edge" d="M830 470 L830 520" marker-end="url(#arr)"/>

  <path class="edge-dashed" d="M780 596 L820 618" marker-end="url(#arr)"/>
</svg>
