    component: InlineEditingDemo
    region: client
    format: png
  - id: column-features
    description: "DataGrid with pinned ID column and resized columns"
    component: ColumnFeaturesDemo
    region: client
    format: png
  - id: paging
    description: "DataGrid loading blocks incrementally with placeholder rows"
    component: PagingDemo
    region: client
    format: png
  - id: row-details
    description: "DataGrid with an expanded row showing detail content"
