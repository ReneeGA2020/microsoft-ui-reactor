<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400">
  <title>Weekly Commit Volume</title>
  <!-- Background -->
  <rect x="0" y="0" width="720" height="400" fill="#FFFFFF" stroke="none"/>
  <!-- Title -->
  <text x="360" y="32" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B1B1B" text-anchor="middle">Weekly Commit Volume</text>
  <!-- Chart area: x=100..680, y=60..320 => width=580, height=260 -->
  <!-- Y-axis gridlines and labels (0, 40, 80, 120, 160) -->
  <line x1="100" y1="320" x2="680" y2="320" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="100" y1="255" x2="680" y2="255" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="100" y1="190" x2="680" y2="190" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="100" y1="125" x2="680" y2="125" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="100" y1="60" x2="680" y2="60" stroke="#E0E0E0" stroke-width="1"/>
  <text x="90" y="324" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="12" fill="#666666" text-anchor="end">0</text>
  <text x="90" y="259" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="12" fill="#666666" text-anchor="end">40</text>
  <text x="90" y="194" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="12" fill="#666666" text-anchor="end">80</text>
  <text x="90" y="129" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="12" fill="#666666" text-anchor="end">120</text>
  <text x="90" y="64" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="12" fill="#666666" text-anchor="end">160</text>
  <!-- Y-axis label -->
  <text x="20" y="190" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="13" fill="#444444" text-anchor="middle" transform="rotate(-90,20,190)">Commits</text>
  <!-- Bars: 5 weeks, bar width=80, gap=36, starting at x=112 -->
  <!-- Week 1: Mar 16 — 87 commits => height = 87/160*260 = 141.4 => y = 320-141.4 = 178.6 -->
  <rect x="112" y="178" width="80" height="142" fill="#0078D4" rx="3" ry="3"/>
  <text x="152" y="170" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#0078D4" text-anchor="middle">87</text>
  <!-- Week 2: Mar 23 — 28 commits => height = 28/160*260 = 45.5 => y = 320-45.5 = 274.5 -->
  <rect x="228" y="274" width="80" height="46" fill="#0078D4" rx="3" ry="3"/>
  <text x="268" y="266" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#0078D4" text-anchor="middle">28</text>
  <!-- Week 3: Mar 30 — 103 commits => height = 103/160*260 = 167.4 => y = 320-167.4 = 152.6 -->
  <rect x="344" y="153" width="80" height="167" fill="#0078D4" rx="3" ry="3"/>
  <text x="384" y="145" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#0078D4" text-anchor="middle">103</text>
  <!-- Week 4: Apr 6 — 168 commits => height = 168/160*260 = 273 => cap at 260 => y = 60 -->
  <rect x="460" y="47" width="80" height="273" fill="#005A9E" rx="3" ry="3"/>
  <text x="500" y="39" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#005A9E" text-anchor="middle">168</text>
  <!-- Week 5: Apr 13 (partial) — 26 commits => height = 26/160*260 = 42.3 => y = 320-42.3 = 277.8 -->
  <rect x="576" y="278" width="80" height="42" fill="#83B9E2" rx="3" ry="3"/>
  <text x="616" y="270" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#83B9E2" text-anchor="middle">26*</text>
  <!-- X-axis labels -->
  <text x="152" y="342" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="12" fill="#444444" text-anchor="middle">Mar 16</text>
  <text x="268" y="342" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="12" fill="#444444" text-anchor="middle">Mar 23</text>
  <text x="384" y="342" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="12" fill="#444444" text-anchor="middle">Mar 30</text>
  <text x="500" y="342" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="12" fill="#444444" text-anchor="middle">Apr 6</text>
  <text x="616" y="342" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="12" fill="#444444" text-anchor="middle">Apr 13</text>
  <!-- Footnote -->
  <text x="680" y="380" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="11" fill="#999999" text-anchor="end">* Partial week (Mon&#8211;Tue only)</text>
  <!-- Axis lines -->
  <line x1="100" y1="320" x2="680" y2="320" stroke="#1B1B1B" stroke-width="1.5"/>
  <line x1="100" y1="60" x2="100" y2="320" stroke="#1B1B1B" stroke-width="1.5"/>
</svg>
