<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" viewBox="0 0 820 380">
  <title>Daily Commit Activity</title>
  <rect x="0" y="0" width="820" height="380" fill="#FFFFFF" stroke="none"/>
  <text x="410" y="30" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B1B1B" text-anchor="middle">Daily Commit Activity</text>
  <!-- Chart area: x=80..790, y=50..300 => width=710, height=250 -->
  <!-- Y gridlines (0, 10, 20, 30, 40, 50) -->
  <line x1="80" y1="300" x2="790" y2="300" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="80" y1="250" x2="790" y2="250" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="80" y1="200" x2="790" y2="200" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="80" y1="150" x2="790" y2="150" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="80" y1="100" x2="790" y2="100" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="80" y1="50" x2="790" y2="50" stroke="#E0E0E0" stroke-width="1"/>
  <text x="72" y="304" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="end">0</text>
  <text x="72" y="254" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="end">10</text>
  <text x="72" y="204" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="end">20</text>
  <text x="72" y="154" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="end">30</text>
  <text x="72" y="104" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="end">40</text>
  <text x="72" y="54" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="end">50</text>
  <!-- Y-axis label -->
  <text x="16" y="175" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="13" fill="#444444" text-anchor="middle" transform="rotate(-90,16,175)">Commits</text>
  <!-- 26 days of data, bar width=24, gap=3.3 -->
  <!-- scale: 1 commit = 5px height. Max 48 = 240px -->
  <!-- Bars: x starts at 85, each bar is 24px wide with ~3.3px gap = 27.3px per bar -->
  <!-- Day 1: Mar 18, 20 => h=100 y=200 -->
  <rect x="85" y="200" width="24" height="100" fill="#0078D4" rx="2" ry="2"/>
  <!-- Day 2: Mar 19, 15 => h=75 y=225 -->
  <rect x="112" y="225" width="24" height="75" fill="#0078D4" rx="2" ry="2"/>
  <!-- Day 3: Mar 20, 11 => h=55 y=245 -->
  <rect x="139" y="245" width="24" height="55" fill="#0078D4" rx="2" ry="2"/>
  <!-- Day 4: Mar 21, 26 => h=130 y=170 -->
  <rect x="166" y="170" width="24" height="130" fill="#0078D4" rx="2" ry="2"/>
  <!-- Day 5: Mar 22 (Sat), 15 => h=75 y=225 -->
  <rect x="193" y="225" width="24" height="75" fill="#6EB8E6" rx="2" ry="2"/>
  <!-- Day 6: Mar 23 (Sun), 10 => h=50 y=250 -->
  <rect x="220" y="250" width="24" height="50" fill="#6EB8E6" rx="2" ry="2"/>
  <!-- Gap for Mar 24 (no commits) -->
  <!-- Day 7: Mar 25, 4 => h=20 y=280, below threshold, dimmed -->
  <rect x="247" y="280" width="24" height="20" fill="#CCCCCC" rx="2" ry="2"/>
  <!-- Day 8: Mar 26, 4 => below threshold -->
  <rect x="274" y="280" width="24" height="20" fill="#CCCCCC" rx="2" ry="2"/>
  <!-- Day 9: Mar 27, 7 => h=35 y=265 -->
  <rect x="301" y="265" width="24" height="35" fill="#0078D4" rx="2" ry="2"/>
  <!-- Day 10: Mar 28, 3 => below threshold -->
  <rect x="328" y="285" width="24" height="15" fill="#CCCCCC" rx="2" ry="2"/>
  <!-- Gap for Mar 29 -->
  <!-- Day 11: Mar 30, 5 => h=25 y=275 -->
  <rect x="355" y="275" width="24" height="25" fill="#6EB8E6" rx="2" ry="2"/>
  <!-- Day 12: Mar 31, 5 => h=25 y=275 -->
  <rect x="382" y="275" width="24" height="25" fill="#0078D4" rx="2" ry="2"/>
  <!-- Day 13: Apr 1, 24 => h=120 y=180 -->
  <rect x="409" y="180" width="24" height="120" fill="#0078D4" rx="2" ry="2"/>
  <!-- Day 14: Apr 2, 9 => h=45 y=255 -->
  <rect x="436" y="255" width="24" height="45" fill="#0078D4" rx="2" ry="2"/>
  <!-- Day 15: Apr 3, 42 => h=210 y=90 -->
  <rect x="463" y="90" width="24" height="210" fill="#005A9E" rx="2" ry="2"/>
  <!-- Day 16: Apr 4, 16 => h=80 y=220 -->
  <rect x="490" y="220" width="24" height="80" fill="#0078D4" rx="2" ry="2"/>
  <!-- Day 17: Apr 5 (Sat), 2 => below threshold -->
  <rect x="517" y="290" width="24" height="10" fill="#CCCCCC" rx="2" ry="2"/>
  <!-- Day 18: Apr 6 (Sun), 5 => h=25 y=275 -->
  <rect x="544" y="275" width="24" height="25" fill="#6EB8E6" rx="2" ry="2"/>
  <!-- Day 19: Apr 7, 20 => h=100 y=200 -->
  <rect x="571" y="200" width="24" height="100" fill="#0078D4" rx="2" ry="2"/>
  <!-- Day 20: Apr 8, 35 => h=175 y=125 -->
  <rect x="598" y="125" width="24" height="175" fill="#005A9E" rx="2" ry="2"/>
  <!-- Day 21: Apr 9, 22 => h=110 y=190 -->
  <rect x="625" y="190" width="24" height="110" fill="#0078D4" rx="2" ry="2"/>
  <!-- Day 22: Apr 10, 15 => h=75 y=225 -->
  <rect x="652" y="225" width="24" height="75" fill="#0078D4" rx="2" ry="2"/>
  <!-- Day 23: Apr 11, 23 => h=115 y=185 -->
  <rect x="679" y="185" width="24" height="115" fill="#0078D4" rx="2" ry="2"/>
  <!-- Day 24: Apr 12 (Sat), 48 => h=240 y=60 -->
  <rect x="706" y="60" width="24" height="240" fill="#003C71" rx="2" ry="2"/>
  <!-- Day 25: Apr 13 (Sun), 24 => h=120 y=180 -->
  <rect x="733" y="180" width="24" height="120" fill="#6EB8E6" rx="2" ry="2"/>
  <!-- Day 26: Apr 14, 2 => below threshold -->
  <rect x="760" y="290" width="24" height="10" fill="#CCCCCC" rx="2" ry="2"/>
  <!-- X-axis labels (selected dates) -->
  <text x="97" y="318" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="10" fill="#444444" text-anchor="middle">3/18</text>
  <text x="178" y="318" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="10" fill="#444444" text-anchor="middle">3/21</text>
  <text x="313" y="318" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="10" fill="#444444" text-anchor="middle">3/27</text>
  <text x="421" y="318" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="10" fill="#444444" text-anchor="middle">4/1</text>
  <text x="475" y="318" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="10" fill="#444444" text-anchor="middle">4/3</text>
  <text x="610" y="318" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="10" fill="#444444" text-anchor="middle">4/8</text>
  <text x="718" y="318" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="10" fill="#444444" text-anchor="middle">4/12</text>
  <text x="772" y="318" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="10" fill="#444444" text-anchor="middle">4/14</text>
  <!-- Legend -->
  <rect x="160" y="340" width="14" height="14" fill="#0078D4" rx="2" ry="2"/>
  <text x="180" y="352" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="11" fill="#444444">Weekday</text>
  <rect x="280" y="340" width="14" height="14" fill="#6EB8E6" rx="2" ry="2"/>
  <text x="300" y="352" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="11" fill="#444444">Weekend</text>
  <rect x="400" y="340" width="14" height="14" fill="#005A9E" rx="2" ry="2"/>
  <text x="420" y="352" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="11" fill="#444444">Peak day (35+)</text>
  <rect x="540" y="340" width="14" height="14" fill="#CCCCCC" rx="2" ry="2"/>
  <text x="560" y="352" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="11" fill="#444444">Below threshold (&lt;5)</text>
  <!-- Axes -->
  <line x1="80" y1="300" x2="790" y2="300" stroke="#1B1B1B" stroke-width="1.5"/>
  <line x1="80" y1="50" x2="80" y2="300" stroke="#1B1B1B" stroke-width="1.5"/>
</svg>
