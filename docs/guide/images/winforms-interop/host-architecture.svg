<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <style>
    text { fill: #1f2328; }
    .label { font-size: 12.5px; font-weight: 500; }
    .sub { font-size: 10.5px; fill: #57606a; }
    .edge-label { font-size: 10.5px; fill: #57606a; }
    .group { fill: none; stroke: #afb8c1; stroke-width: 1.25; stroke-dasharray: 5 4; }
    .group-label { font-size: 12px; font-weight: 600; fill: #57606a; }
    .box { fill: #ffffff; stroke: #57606a; stroke-width: 1.5; }
    .box-accent { fill: #ddf4ff; stroke: #0969da; stroke-width: 1.5; }
    .box-shipped { fill: #d1f4d6; stroke: #1a7f37; stroke-width: 1.5; }
    .edge { stroke: #57606a; stroke-width: 1.5; fill: none; }
    .marker-fill { fill: #57606a; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e6edf3; }
      .sub { fill: #8b949e; }
      .edge-label { fill: #8b949e; }
      .group { stroke: #6e7681; }
      .group-label { fill: #8b949e; }
      .box { fill: #161b22; stroke: #8b949e; }
      .box-accent { fill: #0c2d6b; stroke: #58a6ff; }
      .box-shipped { fill: #033a16; stroke: #3fb950; }
      .edge { stroke: #8b949e; }
      .marker-fill { fill: #8b949e; }
    }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path class="marker-fill" d="M0 0 L10 5 L0 10 z"/>
    </marker>
  </defs>

  <!-- WinForms host group -->
  <rect class="group" x="40" y="20" width="840" height="280" rx="8"/>
  <text class="group-label" x="60" y="42">WinForms host process</text>

  <rect class="box-shipped" x="100" y="70" width="720" height="56" rx="6"/>
  <text class="label" x="460" y="93" text-anchor="middle">XamlIslandBootstrap.Run(() =&gt; …)</text>
  <text class="sub" x="460" y="111" text-anchor="middle">starts the WinUI dispatcher and message loop before any UI thread work</text>

  <rect class="box-shipped" x="100" y="160" width="350" height="56" rx="6"/>
  <text class="label" x="275" y="183" text-anchor="middle">System.Windows.Forms.Form</text>
  <text class="sub" x="275" y="201" text-anchor="middle">native HWND container, designer surface</text>

  <rect class="box-shipped" x="480" y="160" width="340" height="56" rx="6"/>
  <text class="label" x="650" y="183" text-anchor="middle">XamlIslandControl</text>
  <text class="sub" x="650" y="201" text-anchor="middle">System.Windows.Forms.Control · ComponentType property</text>

  <rect class="box" x="100" y="240" width="720" height="44" rx="6"/>
  <text class="sub" x="460" y="266" text-anchor="middle">other WinForms controls (Label, GroupBox, Menu, …) coexist on the form</text>

  <!-- DWXS bridge -->
  <rect class="box-accent" x="240" y="330" width="440" height="60" rx="6"/>
  <text class="label" x="460" y="354" text-anchor="middle">DesktopWindowXamlSource</text>
  <text class="sub" x="460" y="372" text-anchor="middle">WinAppSDK bridge — embeds a XAML island in a native HWND</text>

  <!-- ReactorHostControl -->
  <rect class="box-accent" x="240" y="410" width="440" height="50" rx="6"/>
  <text class="label" x="460" y="432" text-anchor="middle">ReactorHostControl (WinUI UserControl)</text>
  <text class="sub" x="460" y="450" text-anchor="middle">mounts the component named by ComponentType</text>

  <!-- Reactor element tree -->
  <rect class="box-accent" x="240" y="475" width="440" height="56" rx="6"/>
  <text class="label" x="460" y="498" text-anchor="middle">Reactor element tree</text>
  <text class="sub" x="460" y="516" text-anchor="middle">hooks · reconciler · effects · pool</text>

  <!-- Edges -->
  <path class="edge" d="M275 216 L275 240" marker-end="url(#arr)"/>
  <path class="edge" d="M650 216 L650 240" marker-end="url(#arr)"/>
  <path class="edge" d="M650 126 L650 160" marker-end="url(#arr)"/>
  <text class="edge-label" x="660" y="146">Dock=Fill, ComponentType=…</text>

  <path class="edge" d="M650 216 L520 330" marker-end="url(#arr)"/>
  <text class="edge-label" x="540" y="275">stands on</text>

  <path class="edge" d="M460 390 L460 410" marker-end="url(#arr)"/>
  <path class="edge" d="M460 460 L460 475" marker-end="url(#arr)"/>
</svg>
