<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 600" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <style>
    text { fill: #1f2328; }
    .label { font-size: 12.5px; font-weight: 500; }
    .sub { font-size: 10.5px; fill: #57606a; }
    .edge-label { font-size: 10.5px; fill: #57606a; }
    .group { fill: none; stroke: #afb8c1; stroke-width: 1.25; stroke-dasharray: 5 4; }
    .group-label { font-size: 12px; font-weight: 600; fill: #57606a; }
    .box { fill: #ffffff; stroke: #57606a; stroke-width: 1.5; }
    .box-accent { fill: #ddf4ff; stroke: #0969da; stroke-width: 1.5; }
    .box-mute { fill: #f6f8fa; stroke: #8c959f; stroke-width: 1.5; }
    .edge { stroke: #57606a; stroke-width: 1.5; fill: none; }
    .marker-fill { fill: #57606a; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e6edf3; }
      .sub { fill: #8b949e; }
      .edge-label { fill: #8b949e; }
      .group { stroke: #6e7681; }
      .group-label { fill: #8b949e; }
      .box { fill: #161b22; stroke: #8b949e; }
      .box-accent { fill: #0c2d6b; stroke: #58a6ff; }
      .box-mute { fill: #1c2129; stroke: #6e7681; }
      .edge { stroke: #8b949e; }
      .marker-fill { fill: #8b949e; }
    }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path class="marker-fill" d="M0 0 L10 5 L0 10 z"/>
    </marker>
  </defs>

  <!-- Author -->
  <rect class="box-accent" x="460" y="20" width="200" height="50" rx="6"/>
  <text class="label" x="560" y="44" text-anchor="middle">Component author</text>
  <text class="sub" x="560" y="60" text-anchor="middle">writes Render()</text>

  <!-- Authoring surface group -->
  <rect class="group" x="40" y="100" width="1040" height="130" rx="8"/>
  <text class="group-label" x="60" y="120">Author surface (Reactor DSL)</text>

  <rect class="box" x="60" y="140" width="220" height="74" rx="6"/>
  <text class="label" x="170" y="162" text-anchor="middle">.Animate(props)</text>
  <text class="sub" x="170" y="180" text-anchor="middle">declaration-site implicit</text>
  <text class="sub" x="170" y="196" text-anchor="middle">per-property easing</text>

  <rect class="box" x="300" y="140" width="240" height="74" rx="6"/>
  <text class="label" x="420" y="162" text-anchor="middle">WithAnimation(curve, () =&gt; …)</text>
  <text class="sub" x="420" y="180" text-anchor="middle">ambient scope</text>
  <text class="sub" x="420" y="196" text-anchor="middle">reconciler-driven</text>

  <rect class="box" x="560" y="140" width="220" height="74" rx="6"/>
  <text class="label" x="670" y="162" text-anchor="middle">Keyframes(b =&gt; b.At(…))</text>
  <text class="sub" x="670" y="180" text-anchor="middle">imperative timeline</text>
  <text class="sub" x="670" y="196" text-anchor="middle">spring / cubic</text>

  <rect class="box" x="800" y="140" width="240" height="74" rx="6"/>
  <text class="label" x="920" y="162" text-anchor="middle">.Transition(Fade + Slide)</text>
  <text class="sub" x="920" y="180" text-anchor="middle">enter / exit</text>
  <text class="sub" x="920" y="196" text-anchor="middle">on mount / unmount</text>

  <!-- Reconciler resolution group -->
  <rect class="group" x="40" y="270" width="1040" height="140" rx="8"/>
  <text class="group-label" x="60" y="290">Reconciler resolution</text>

  <rect class="box-accent" x="380" y="310" width="200" height="80" rx="6"/>
  <text class="label" x="480" y="332" text-anchor="middle">Reconciler.Update</text>
  <text class="sub" x="480" y="350" text-anchor="middle">writes Visual.Properties</text>
  <text class="sub" x="480" y="365" text-anchor="middle">routes through</text>
  <text class="sub" x="480" y="378" text-anchor="middle">AnimationScope.Current</text>

  <rect class="box-mute" x="60" y="320" width="280" height="64" rx="6"/>
  <text class="label" x="200" y="343" text-anchor="middle">ImplicitAnimationCollection</text>
  <text class="sub" x="200" y="361" text-anchor="middle">per-property triggers on Visual</text>
  <text class="sub" x="200" y="376" text-anchor="middle">(setter takes animation path)</text>

  <rect class="box-mute" x="640" y="320" width="380" height="64" rx="6"/>
  <text class="label" x="830" y="343" text-anchor="middle">KeyFrameAnimation / SpringAnimation</text>
  <text class="sub" x="830" y="361" text-anchor="middle">StartAnimation()</text>
  <text class="sub" x="830" y="376" text-anchor="middle">enter ShowEffect · exit HideEffect</text>

  <!-- Composition -->
  <rect class="box-accent" x="280" y="450" width="280" height="60" rx="6"/>
  <text class="label" x="420" y="474" text-anchor="middle">Composition layer</text>
  <text class="sub" x="420" y="492" text-anchor="middle">Visual.Properties · CompositionAnimation</text>

  <rect class="box-accent" x="600" y="450" width="200" height="60" rx="6"/>
  <text class="label" x="700" y="474" text-anchor="middle">Windows Composition</text>
  <text class="sub" x="700" y="492" text-anchor="middle">DWM compositor thread</text>

  <rect class="box-accent" x="840" y="450" width="200" height="60" rx="6"/>
  <text class="label" x="940" y="474" text-anchor="middle">Next frame</text>
  <text class="sub" x="940" y="492" text-anchor="middle">to screen</text>

  <!-- Edges author → authoring -->
  <path class="edge" d="M520 70 L170 140" marker-end="url(#arr)"/>
  <path class="edge" d="M540 70 L420 140" marker-end="url(#arr)"/>
  <path class="edge" d="M580 70 L670 140" marker-end="url(#arr)"/>
  <path class="edge" d="M600 70 L920 140" marker-end="url(#arr)"/>

  <!-- Authoring → resolution -->
  <path class="edge" d="M170 214 L200 320" marker-end="url(#arr)"/>
  <path class="edge" d="M420 214 L480 310" marker-end="url(#arr)"/>
  <text class="edge-label" x="440" y="270">routes writes</text>
  <path class="edge" d="M670 214 L800 320" marker-end="url(#arr)"/>
  <path class="edge" d="M920 214 L900 320" marker-end="url(#arr)"/>

  <path class="edge" d="M480 390 L420 450" marker-end="url(#arr)"/>
  <text class="edge-label" x="430" y="425">setter</text>
  <path class="edge" d="M200 384 L350 450" marker-end="url(#arr)"/>
  <path class="edge" d="M830 384 L580 450" marker-end="url(#arr)"/>

  <path class="edge" d="M560 480 L600 480" marker-end="url(#arr)"/>
  <path class="edge" d="M800 480 L840 480" marker-end="url(#arr)"/>
</svg>
